};
const catIcon = (cat) => CAT_ICONS[cat] || CAT_ICONS["default"];

// ─── UTILS ───────────────────────────────────────────────────────────────────
const todayStr = () => new Date().toISOString().split("T")[0];
function daysAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split("T")[0]; }
function daysFromNow(n) { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; }

function getSemaforo(h) {
  if (h.stage==="Chiuso") return "closed";
  const today=new Date(); today.setHours(0,0,0,0);
  const ins=h.insertDate?new Date(h.insertDate):today;
  const dp=Math.floor((today-ins)/86400000);
  const check=h.recallManual?new Date(h.recallManual):new Date(ins.getTime()+15*86400000);
  const dta=Math.floor((check-today)/86400000);
  if(dta<0) return "red";
  if(dta<=3||dp>=7) return "orange";
  return "green";
}

const SEM={
  green: {label:"🟢 In tempo",  bg:"#D6F5D6",color:"#2E7D32",border:"#86EFAC"},
  orange:{label:"🟠 Contattare",bg:"#FFE5CC",color:"#E65100",border:"#FBD38D"},
  red:   {label:"🔴 Urgente",   bg:"#FFD0D0",color:"#C62828",border:"#FCA5A5"},
  closed:{label:"✅ Chiuso",    bg:"#D1FAE5",color:"#065F46",border:"#6EE7B7"},
};

function getDaysInfo(h) {
  const today=new Date(); today.setHours(0,0,0,0);
  const ins=h.insertDate?new Date(h.insertDate):today;
  const auto=new Date(ins.getTime()+15*86400000);
  const check=h.recallManual?new Date(h.recallManual):auto;
  const days=Math.floor((check-today)/86400000);
  return {days, isManual:!!h.recallManual, autoDate:auto.toISOString().split("T")[0]};
}

function normalizeUrl(url) {
  if(!url) return "";
  const s=String(url).trim();
  if(!s||s==="nan"||s==="None") return "";
  return s.startsWith("http")?s:"https://"+s;
}

// Estrai place_id dall'URL Google Maps
function extractPlaceId(url) {
  if(!url) return "";
  const m=String(url).match(/query_place_id=([^&\s]+)/);
  return m?m[1]:"";
}

// URL Google Maps con place_id (precisissimo)
function mapsViewUrl(h) {
  if(h.placeId) return `https://www.google.com/maps/search/?api=1&query_place_id=${h.placeId}`;
  if(h.address||h.city) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((h.address||"")+" "+(h.city||""))}`;
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(h.name||"")}`;
}

function mapsNavUrl(h) {
  const dest=h.placeId?`place_id:${h.placeId}`:encodeURIComponent((h.address||h.name||"")+" "+(h.city||""));
  return h.placeId
    ?`https://www.google.com/maps/dir/?api=1&destination_place_id=${h.placeId}`
    :`https://www.google.com/maps/dir/?api=1&destination=${dest}`;
}

// Foto da Google Places (gratuita, usa place_id)
function placesPhotoUrl(h) {
  // Con place_id possiamo usare l'embed di Maps che mostra la foto ufficiale
  // Usiamo Street View API (gratuita senza key per thumbnail)
  if(h.address||h.city) {
    const loc=encodeURIComponent((h.address||h.name)+" "+(h.city||""));
    return `https://maps.googleapis.com/maps/api/streetview?size=600x200&location=${loc}&fov=90&heading=70&pitch=5`;
  }
  return "";
}

// ─── PARSER FILE GOOGLE PLACES ───────────────────────────────────────────────
// Mappa esatta delle colonne del crawler
function parseGooglePlacesRow(headers, row) {
  const map = {};
  headers.forEach((h,i) => { map[String(h).toLowerCase().trim()] = row[i]; });
  const g = (k) => {
    const val = map[k];
    if(val===undefined||val===null||val==="nan"||val==="None"||val!==val) return "";
    return String(val).trim();
  };

  const rawUrl = g("url");
  const placeId = extractPlaceId(rawUrl);

  // Costruisci categoria unificata dalle colonne categories/0..N
  const cats = [];
  for(let i=0;i<10;i++) {
    const c = g(`categories/${i}`);
    if(c) cats.push(c);
  }

  const name = g("title");
  if(!name) return null;

  return {
    id: Date.now() + Math.random(),
    name,
    city:     g("city"),
    address:  g("street"),
    state:    g("state"),
    phone:    g("phone"),
    email:    "",
    website:  normalizeUrl(g("website")),
    category: g("categoryname") || cats[0] || "",
    allCategories: cats,
    rating:   parseFloat(g("totalscore")) || 0,
    reviews:  parseInt(g("reviewscount")) || 0,
    placeId,
    mapsUrl:  rawUrl,
    stars:    0,
    contact:  "",
    stage:    "Lead",
    value:    0,
    insertDate:    todayStr(),
    lastContact:   "",
    recallManual:  "",
    notes:         "",
    reminderChannels: ["Email"],
    photo:    "",
  };
}

];

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiCall(action,payload={}) {
  if(!APPS_SCRIPT_URL) throw new Error("NO_URL");
  const res=await fetch(APPS_SCRIPT_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,...payload})});
  return res.json();
}

// ─── UI COMPONENTS ────────────────────────────────────────────────────────────

function Toast({msg,type="success",onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[]);
  const bg=type==="error"?"#DC2626":type==="warn"?"#D97706":"#059669";
  return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:bg,color:"white",borderRadius:10,padding:"12px 22px",fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>{type==="error"?"❌":type==="warn"?"⚠️":"✓"} {msg}</div>;
}

function StatCard({icon,label,value,bg,color,sub}) {
  return(
    <div style={{background:bg,borderRadius:12,padding:"13px 16px",flex:1,minWidth:95,border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
      <div style={{fontSize:17,marginBottom:3}}>{icon}</div>
      <div style={{fontSize:19,fontWeight:800,color}}>{value}</div>
      <div style={{fontSize:11,color:"#64748B",marginTop:1,fontWeight:500}}>{label}</div>
      {sub&&<div style={{fontSize:10,color,marginTop:1,fontWeight:600}}>{sub}</div>}
    </div>
  );
}

function StageBadge({stage}) {
  const s=STAGES.find(x=>x.id===stage)||STAGES[0];
  return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.dot}44`,borderRadius:20,fontSize:11,fontWeight:700,padding:"3px 9px",whiteSpace:"nowrap",display:"inline-flex",alignItems:"center",gap:4}}><span style={{background:s.dot,width:5,height:5,borderRadius:"50%",flexShrink:0}}/>{s.emoji} {s.label}</span>;
}

function SemBadge({sem,size="sm"}) {
  const c=SEM[sem];
  return <span style={{background:c.bg,color:c.color,border:`1.5px solid ${c.border}`,borderRadius:20,fontSize:size==="lg"?12:11,fontWeight:700,padding:size==="lg"?"5px 12px":"3px 8px",whiteSpace:"nowrap"}}>{c.label}</span>;
}

function DaysChip({h}) {
  const {days,isManual}=getDaysInfo(h);
  if(h.stage==="Chiuso") return null;
  const bg=days<0?"#FEE2E2":days<=3?"#FEF9C3":"#F0FDF4";
  const color=days<0?"#DC2626":days<=3?"#B45309":"#15803D";
  const label=days<0?`Scad.${Math.abs(days)}gg`:days===0?"Oggi!":days===1?"Domani":`${days}gg`;
  return <span title={isManual?"📅 Data accordata":"⏱ Auto +15gg"} style={{background:bg,color,fontSize:11,fontWeight:700,borderRadius:6,padding:"2px 7px",whiteSpace:"nowrap",cursor:"help"}}>{isManual?"📅 ":"⏱ "}{label}</span>;
}

// ─── HOTEL CARD ──────────────────────────────────────────────────────────────

  const sc=SEM[sem];

    <div onClick={()=>onClick(h)} style={{background:selected?"#EFF6FF":"white",border:`2px solid ${selected?"#3B82F6":sc.border}`,borderLeft:`4px solid ${sc.color}`,borderRadius:10,padding:"11px 12px",cursor:"pointer",marginBottom:7,boxShadow:selected?"0 0 0 3px #BFDBFE55":"0 1px 3px rgba(0,0,0,0.05)",transition:"border-color 0.15s"}}>

      {/* Foto/streetview strip */}
      {h.photo&&<div style={{marginBottom:7,borderRadius:7,overflow:"hidden",height:75}}><img src={h.photo} alt={h.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/></div>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
        <div style={{flex:1,minWidth:0,paddingRight:6}}>
          <div style={{fontWeight:700,fontSize:12,color:"#0F172A",marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {icon} {h.name}
          </div>
          <div style={{fontSize:11,color:"#64748B"}}>{h.city}{h.category?` · ${h.category}`:""}</div>
          {h.rating>0&&<div style={{fontSize:10,color:"#F59E0B"}}>★{h.rating.toFixed(1)} <span style={{color:"#94A3B8"}}>({h.reviews})</span></div>}
        </div>
        <div style={{fontWeight:800,fontSize:12,color:"#059669",whiteSpace:"nowrap"}}>{h.value>0?`€${Number(h.value).toLocaleString("it-IT")}`:"—"}</div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4,flexWrap:"wrap"}}>
        <SemBadge sem={sem}/>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {h.placeId&&<span title="Google Maps disponibile" style={{fontSize:11}}>📍</span>}
          {h.website&&<span title="Sito web disponibile" style={{fontSize:11}}>🌐</span>}

  useEffect(()=>{setF({...h});setOk(false);},[h.id]);

  const handleSave=async()=>{await onSave(f);setOk(true);setTimeout(()=>setOk(false),2200);};

  const loadPhoto=async()=>{
    if(!f.website) return;
    setLoadingPhoto(true);
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:`Visita ${f.website} e restituisci SOLO l'URL assoluto dell'og:image o immagine principale. Solo URL, nient'altro.`}]})});
      const data=await res.json();
      const url=(data.content?.[0]?.text||"").trim();
      if(url.startsWith("http")) set("photo",url);
    } catch{}
    setLoadingPhoto(false);
  };

  const sem=getSemaforo(f);
  const sc=SEM[sem];
  const {days,isManual,autoDate}=getDaysInfo(f);
  const streetViewUrl=placesPhotoUrl(f);

  return(
    <div style={{background:"white",borderRadius:14,border:"1px solid #E2E8F0",overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.09)"}}>

      {/* ── FOTO HEADER ── */}

        {f.photo
          ?<img src={f.photo} alt={f.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>

function ImportModal({onImport,onClose}) {
  const [step,setStep]=useState("upload");
  const [parsed,setParsed]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filterCat,setFilterCat]=useState("all");
  const [cats,setCats]=useState([]);
  const fileRef=useRef();

  const handleFile=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    setLoading(true);
    try {
      const XLSX=await import("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(data.length<2){alert("File vuoto");return;}
      const headers=data[0].map(h=>String(h));
      const rows=data.slice(1).filter(r=>r.some(c=>c!==""));
      const items=rows.map(r=>parseGooglePlacesRow(headers,r)).filter(Boolean);
      setParsed(items);
      // categorie uniche
      const uniqueCats=[...new Set(items.map(x=>x.category).filter(Boolean))].sort();
      setCats(uniqueCats);
      setStep("preview");
    } catch(err){alert("Errore: "+err.message);}
    finally{setLoading(false);}
    e.target.value="";
  };

  const filtered=filterCat==="all"?parsed:parsed.filter(x=>x.category===filterCat);

  const handleImport=()=>{
    onImport(filtered);
    setStep("done");
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"white",borderRadius:16,padding:26,width:720,maxWidth:"94vw",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 60px rgba(0,0,0,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:15,color:"#0F172A"}}>📥 Importa Database Google Places (.xlsx)</div>
          <button onClick={onClose} style={{background:"#F1F5F9",border:"none",borderRadius:7,cursor:"pointer",padding:"5px 11px",fontSize:15,color:"#64748B"}}>✕</button>
        </div>

        {step==="upload"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"20px 0"}}>
            <div style={{fontSize:44}}>📊</div>
            <div style={{fontWeight:700,fontSize:14,color:"#0F172A"}}>Carica il file esportato da Google Places Crawler</div>
            <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:9,padding:"12px 16px",fontSize:12,color:"#15803D",lineHeight:1.8,width:"100%",boxSizing:"border-box"}}>
              ✓ Colonne riconosciute automaticamente: <strong>title, totalScore, reviewsCount, street, city, state, website, phone, categories/0..N, url, categoryName</strong><br/>
              ✓ Il <strong>Place ID</strong> viene estratto dall'URL per Maps e navigazione precisissima<br/>
              ✓ Le categorie vengono preservate per filtrare (RSA, Studentati, Hotel, Comuni...)
            </div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current.click()} disabled={loading}
              style={{background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",borderRadius:10,color:"white",fontWeight:700,padding:"11px 26px",fontSize:13,cursor:"pointer"}}>
              {loading?"⏳ Lettura...":"📂 Scegli file .xlsx"}
            </button>
          </div>
        )}

        {step==="preview"&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"7px 12px",fontSize:13,color:"#15803D",fontWeight:600}}>
                ✓ {parsed.length} strutture rilevate

                  <option value="all">Tutte le categorie ({parsed.length})</option>
                  {cats.map(c=><option key={c} value={c}>{catIcon(c)} {c} ({parsed.filter(x=>x.category===c).length})</option>)}
                </select>
                <span style={{fontSize:12,color:"#2563EB",fontWeight:700}}>{filtered.length} selezionate</span>
              </div>
            </div>

            <div style={{flex:1,overflowY:"auto",marginBottom:14}}>
              {filtered.slice(0,8).map((h,i)=>(

            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setStep("upload")} style={{flex:1,background:"#F1F5F9",border:"1px solid #E2E8F0",color:"#475569",borderRadius:9,padding:11,cursor:"pointer",fontWeight:600,fontSize:13}}>← Indietro</button>
              <button onClick={handleImport} style={{flex:2,background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"white",borderRadius:9,padding:11,cursor:"pointer",fontWeight:800,fontSize:14}}>
                ✓ Importa {filtered.length} strutture nel CRM
              </button>
            </div>
          </>
        )}

        {step==="done"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"28px 0"}}>
            <div style={{fontSize:48}}>✅</div>
            <div style={{fontWeight:800,fontSize:16,color:"#15803D"}}>Import completato!</div>
            <div style={{fontSize:13,color:"#64748B",textAlign:"center"}}>Tutte le strutture sono in stage "Lead". Clicca una scheda per vedere Maps, sito web e Street View.</div>
            <button onClick={onClose} style={{background:"#2563EB",border:"none",color:"white",borderRadius:9,padding:"10px 26px",fontWeight:700,fontSize:14,cursor:"pointer"}}>Vai al CRM →</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AIReport({hotels,onClose}) {
  const [report,setReport]=useState("");const[loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      try{
        const cnt={red:0,orange:0,green:0,closed:0};
        hotels.forEach(h=>cnt[getSemaforo(h)]++);
        const pipeline=hotels.filter(h=>h.stage!=="Chiuso").reduce((s,h)=>s+(Number(h.value)||0),0);
        const sample=hotels.slice(0,40).map(h=>`${h.name} (${h.city}, ${h.category}): stage=${h.stage}, sem=${getSemaforo(h)}, €${h.value||0}, note="${h.notes||""}"`).join("\n");
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Sales analyst domotica B2B. Pipeline: ${hotels.length} strutture (RSA, studentati, hotel, PA), €${pipeline.toLocaleString()}, ${cnt.red} urgenti, ${cnt.orange} da contattare.\n\nReport settimanale italiano: Executive Summary 3 righe, top 3 urgenze OGGI, 5 azioni concrete, opportunità per categoria.\n\nDati:\n${sample}`}]})});
        const data=await res.json();
        setReport(data.content?.[0]?.text||"Errore.");
      }catch(e){setReport("Errore: "+e.message);}
      finally{setLoading(false);}
    })();
  },[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"white",borderRadius:16,padding:26,width:660,maxWidth:"92vw",maxHeight:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 60px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:15,color:"#0F172A"}}>⚡ Report Settimanale AI</div>
          <button onClick={onClose} style={{background:"#F1F5F9",border:"none",borderRadius:7,cursor:"pointer",padding:"5px 10px",fontSize:15,color:"#64748B"}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {loading?<div style={{textAlign:"center",padding:44,color:"#94A3B8"}}>⏳ Analisi pipeline...</div>
          :<div style={{color:"#334155",fontSize:13,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{report}</div>}
        </div>
      </div>
    </div>
  );
}

window.App = function App() {

  const [showReport,setShowReport]=useState(false);
  const [toast,setToast]=useState(null);
  const [saving,setSaving]=useState(false);
  const connected=!!APPS_SCRIPT_URL;

  const allCats=[...new Set(hotels.map(h=>h.category).filter(Boolean))].sort();

  const filtered=hotels.filter(h=>{
    const q=search.toLowerCase();
    return(!q||h.name?.toLowerCase().includes(q)||h.city?.toLowerCase().includes(q)||(h.contact||"").toLowerCase().includes(q)||(h.category||"").toLowerCase().includes(q))
      &&(stageFilter==="all"||h.stage===stageFilter)
      &&(semFilter==="all"||getSemaforo(h)===semFilter)
      &&(catFilter==="all"||h.category===catFilter);
  });

  const cnt={red:0,orange:0,green:0,closed:0};
  hotels.forEach(h=>cnt[getSemaforo(h)]++);
  const pipeline=hotels.filter(h=>h.stage!=="Chiuso").reduce((s,h)=>s+(Number(h.value)||0),0);
  const closedVal=hotels.filter(h=>h.stage==="Chiuso").reduce((s,h)=>s+(Number(h.value)||0),0);

  const saveHotel=async(updated)=>{
    setSaving(true);
    setHotels(prev=>prev.map(h=>h.id===updated.id?updated:h));
    setSelected(updated);
    if(connected){try{await apiCall("saveHotel",{hotel:updated});setToast({msg:"Salvato su Google Sheets ✓",type:"success"});}
    catch{setToast({msg:"Errore Sheets — salvato localmente",type:"warn"});}}
    else setToast({msg:"Salvato (modalità demo)",type:"warn"});
    setSaving(false);
  };

  const deleteHotel=async(id)=>{
    setHotels(prev=>prev.filter(h=>h.id!==id));
    setSelected(null);
    if(connected){try{await apiCall("deleteHotel",{id});}catch{}}
    setToast({msg:"Struttura eliminata",type:"success"});
  };

  const addHotel=()=>{
    const n={id:Date.now(),name:"Nuova Struttura",city:"",address:"",phone:"",email:"",website:"",category:"Hotel",allCategories:[],rating:0,reviews:0,placeId:"",mapsUrl:"",stars:0,contact:"",stage:"Lead",value:0,insertDate:todayStr(),lastContact:"",recallManual:"",notes:"",reminderChannels:["Email"],photo:""};
    setHotels(prev=>[...prev,n]); setSelected(n);
  };

  const handleImport=(items)=>{
    setHotels(prev=>[...prev,...items]);
    setToast({msg:`${items.length} strutture importate ✓`,type:"success"});
  };

  return(
    <div style={{minHeight:"100vh",background:"#F1F5F9",fontFamily:"'Inter','Segoe UI',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

      {/* HEADER */}
      <div style={{background:"white",borderBottom:"1px solid #E2E8F0",padding:"11px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"linear-gradient(135deg,#2563EB,#7C3AED)",borderRadius:9,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🏨</div>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#0F172A"}}>Domotica HCS — CRM Lombardia</div>
            <div style={{fontSize:10,display:"flex",alignItems:"center",gap:6}}>
              <span style={{color:connected?"#16A34A":"#F59E0B",fontWeight:700}}>{connected?"● Sheets live":"● Demo"}</span>
              <span style={{color:"#94A3B8"}}>{hotels.length} strutture · Hotel · RSA · PA · Studentati</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setShowImport(true)} style={{background:"#EFF6FF",border:"1px solid #BFDBFE",color:"#1D4ED8",borderRadius:7,padding:"7px 11px",cursor:"pointer",fontSize:11,fontWeight:700}}>📥 Import XLSX</button>
          <button onClick={()=>setShowReport(true)} style={{background:"#FFF7ED",border:"1px solid #FED7AA",color:"#C2410C",borderRadius:7,padding:"7px 11px",cursor:"pointer",fontSize:11,fontWeight:700}}>⚡ AI Report</button>
          <button onClick={addHotel} style={{background:"#2563EB",border:"none",color:"white",borderRadius:7,padding:"7px 13px",cursor:"pointer",fontSize:11,fontWeight:700}}>+ Struttura</button>
        </div>
      </div>

      <div style={{padding:"13px 20px"}}>
        {/* STATS */}
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <StatCard icon="🏢" label="Strutture" value={hotels.length} bg="white" color="#2563EB"/>
          <StatCard icon="📊" label="Pipeline" value={pipeline>0?`€${Math.round(pipeline/1000)}k`:"—"} bg="white" color="#7C3AED"/>
          <StatCard icon="✅" label="Chiusi" value={closedVal>0?`€${Math.round(closedVal/1000)}k`:"—"} bg="#F0FDF4" color="#16A34A"/>
          <StatCard icon="🔴" label="Urgenti" value={cnt.red} bg={cnt.red>0?"#FFF1F2":"white"} color={cnt.red>0?"#DC2626":"#CBD5E1"} sub={cnt.red>0?"contattare subito":""}/>
          <StatCard icon="🟠" label="Contattare" value={cnt.orange} bg={cnt.orange>0?"#FFF7ED":"white"} color={cnt.orange>0?"#D97706":"#CBD5E1"}/>
          <StatCard icon="🟢" label="In ordine" value={cnt.green} bg="#F0FDF4" color="#15803D"/>
        </div>

        {/* FILTRI */}
        <div style={{display:"flex",gap:7,marginBottom:11,flexWrap:"wrap",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Nome, città, categoria..."
            style={{background:"white",border:"1.5px solid #E2E8F0",borderRadius:8,color:"#0F172A",padding:"7px 12px",fontSize:12,width:220,outline:"none",fontFamily:"inherit"}}/>
          <select value={stageFilter} onChange={e=>setStageFilter(e.target.value)}
            style={{background:"white",border:"1.5px solid #E2E8F0",borderRadius:8,color:"#0F172A",padding:"7px 10px",fontSize:12,outline:"none",fontFamily:"inherit"}}>
            <option value="all">Tutti stage</option>
            {STAGES.map(s=><option key={s.id} value={s.id}>{s.emoji} {s.label} ({hotels.filter(h=>h.stage===s.id).length})</option>)}
          </select>
          <select value={semFilter} onChange={e=>setSemFilter(e.target.value)}
            style={{background:"white",border:"1.5px solid #E2E8F0",borderRadius:8,color:"#0F172A",padding:"7px 10px",fontSize:12,outline:"none",fontFamily:"inherit"}}>
            <option value="all">Tutti semafori</option>
            <option value="red">🔴 Urgenti ({cnt.red})</option>
            <option value="orange">🟠 Da contattare ({cnt.orange})</option>
            <option value="green">🟢 In ordine ({cnt.green})</option>
            <option value="closed">✅ Chiusi ({cnt.closed})</option>
          </select>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
            style={{background:"white",border:"1.5px solid #E2E8F0",borderRadius:8,color:"#0F172A",padding:"7px 10px",fontSize:12,outline:"none",fontFamily:"inherit"}}>
            <option value="all">Tutte categorie</option>
            {allCats.map(c=><option key={c} value={c}>{catIcon(c)} {c} ({hotels.filter(h=>h.category===c).length})</option>)}
          </select>
          <div style={{marginLeft:"auto",display:"flex",background:"white",border:"1.5px solid #E2E8F0",borderRadius:8,overflow:"hidden"}}>
            {["kanban","list"].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#2563EB":"white",color:view===v?"white":"#64748B",border:"none",padding:"7px 13px",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>
                {v==="kanban"?"⊞ Kanban":"☰ Lista"}
              </button>
            ))}
          </div>
        </div>
        <div style={{fontSize:11,color:"#94A3B8",marginBottom:10}}>
          Mostrando <strong style={{color:"#0F172A"}}>{filtered.length}</strong> di {hotels.length} strutture
        </div>

        {/* CONTENT */}
        <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            {view==="kanban"?<KanbanView hotels={filtered} onSelect={setSelected} selectedId={selected?.id}/>:<ListView hotels={filtered} onSelect={setSelected} selectedId={selected?.id}/>}
          </div>
          {selected&&(
            <div style={{width:320,flexShrink:0}}>
              <DetailPanel h={selected} onSave={saveHotel} onDelete={deleteHotel} onClose={()=>setSelected(null)} saving={saving}/>
            </div>
          )}
        </div>
      </div>

      {showImport&&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)}/>}
      {showReport&&<AIReport hotels={hotels} onClose={()=>setShowReport(false)}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}
</script>

<script>
  // Aspetta che Babel finisca la compilazione
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function mount() {
      if (window.App) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));
      } else {
        setTimeout(mount, 100);
      }
    }, 500);
  });
</script>
</body>
</html>
